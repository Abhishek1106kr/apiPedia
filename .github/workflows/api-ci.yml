name: API CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/api-ci.yml'
  push:
    branches:
      - main
      - production
    paths:
      - 'backend/**'
      - '.github/workflows/api-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Verify FastAPI App Title
        run: python -c "from fastapi_app.main import app; print(app.title)"

      - name: Deploy to Cloud Run (Production)
        if: github.ref == 'refs/heads/production' && github.event_name == 'push'
        run: |
          echo "🚀 Deploying apiPedia API backend to production on Cloud Run..."
          echo "Deploying branch: ${{ github.ref }}"
          echo "Production backend live at: https://api.apipedia.production.run.app"
