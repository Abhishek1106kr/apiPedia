name: API CI

# The legacy backend/ (Django/FastAPI) is unbuilt-upon scaffolding per
# docs/00-master-prompt.md — no CI for it. This workflow covers server/,
# the real Fastify/Prisma service. Runs a genuine Postgres service
# container so `prisma migrate deploy` is verified against a real
# database on every push/PR, not just type-checked.
on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
      - production
    paths:
      - "server/**"
      - ".github/workflows/api-ci.yml"

concurrency:
  group: api-ci-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apipedia
          POSTGRES_PASSWORD: apipedia
          POSTGRES_DB: apipedia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apipedia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://apipedia:apipedia@localhost:5432/apipedia?schema=public"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: "server/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Apply migrations to real Postgres
        run: npx prisma migrate deploy

      - name: Type-check and build
        run: npm run build
