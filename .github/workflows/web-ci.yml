name: Web CI

# Frontend now lives at the repo root (see docs/00-master-prompt.md
# deployment strategy — this was deliberately restructured to match
# Vercel's zero-config root detection). Path filters here exclude
# server/** and backend/** so this job only runs when frontend files
# actually change. Vercel's own GitHub integration handles deployment;
# this workflow is validation only, not a deploy step.
on:
  pull_request:
    paths-ignore:
      - "server/**"
      - "backend/**"
      - "docs/**"
  push:
    branches:
      - main
      - production
    paths-ignore:
      - "server/**"
      - "backend/**"
      - "docs/**"

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
